name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/reservas/package-lock.json

      - name: Build plugin assets
        working-directory: plugins/reservas
        run: npm ci && npx vite build

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "plugins/reservas/dist/"
          target: "~/aba_dist_tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ~/deploy.sh
            docker cp ~/aba_dist_tmp/plugins/reservas/dist/. aba_wordpress:/var/www/html/wp-content/plugins/reservas/dist/
            docker exec aba_wordpress chown -R www-data:www-data /var/www/html/wp-content/plugins/reservas/dist/ 2>/dev/null || true
            docker exec aba_wordpress wp --allow-root cache flush 2>/dev/null || true
            rm -rf ~/aba_dist_tmp
